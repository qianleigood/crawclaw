name: Install Smoke

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  workflow_dispatch:

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.event.pull_request.number) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    outputs:
      docs_only: ${{ steps.manifest.outputs.docs_only }}
      run_install_smoke: ${{ steps.manifest.outputs.run_install_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: false
          persist-credentials: false
          submodules: false

      - name: Ensure preflight base commit
        uses: ./.github/actions/ensure-base-commit
        with:
          base-sha: ${{ github.event_name == 'push' && github.event.before || github.event.pull_request.base.sha }}
          fetch-ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.base.ref }}

      - name: Detect docs-only changes
        id: docs_scope
        uses: ./.github/actions/detect-docs-changes

      - name: Detect changed smoke scope
        id: changed_scope
        if: steps.docs_scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="${{ github.event.pull_request.base.sha }}"
          fi

          node scripts/ci-changed-scope.mjs --base "$BASE" --head HEAD

      - name: Setup Node environment
        if: steps.docs_scope.outputs.docs_only != 'true'
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          install-deps: "false"
          use-sticky-disk: "false"

      - name: Build install-smoke CI manifest
        id: manifest
        env:
          CRAWCLAW_CI_DOCS_ONLY: ${{ steps.docs_scope.outputs.docs_only }}
          CRAWCLAW_CI_DOCS_CHANGED: "false"
          CRAWCLAW_CI_RUN_NODE: "false"
          CRAWCLAW_CI_RUN_MACOS: "false"
          CRAWCLAW_CI_RUN_WINDOWS: "false"
          CRAWCLAW_CI_RUN_SKILLS_PYTHON: "false"
          CRAWCLAW_CI_HAS_CHANGED_EXTENSIONS: "false"
          CRAWCLAW_CI_CHANGED_EXTENSIONS_MATRIX: '{"include":[]}'
          CRAWCLAW_CI_RUN_CHANGED_SMOKE: ${{ steps.changed_scope.outputs.run_changed_smoke || 'false' }}
        run: node scripts/ci-write-manifest-outputs.mjs --workflow install-smoke

  install-smoke:
    needs: [preflight]
    if: needs.preflight.outputs.run_install_smoke == 'true'
    runs-on: ubuntu-24.04
    env:
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    steps:
      - name: Checkout CLI
        uses: actions/checkout@v6

      - name: Set up Docker Builder
        uses: docker/setup-buildx-action@v4

      # Keep smoke builds driver-agnostic so they work on GitHub-hosted runners.
      - name: Build root Dockerfile smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            CRAWCLAW_DOCKER_APT_UPGRADE=0
          tags: crawclaw-dockerfile-smoke:local
          load: true
          push: false
          provenance: false

      - name: Run root Dockerfile CLI smoke
        run: |
          docker run --rm --entrypoint sh crawclaw-dockerfile-smoke:local -lc '
            which crawclaw &&
            crawclaw --version &&
            crawclaw runtimes doctor &&
            crawclaw runtimes list --json
          '

      # This smoke validates that the build-arg path preinstalls the matrix
      # runtime deps declared by the plugin and that matrix discovery stays
      # healthy in the final runtime image.
      - name: Build extension Dockerfile smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            CRAWCLAW_DOCKER_APT_UPGRADE=0
            CRAWCLAW_EXTENSIONS=matrix
          tags: crawclaw-ext-smoke:local
          load: true
          push: false
          provenance: false

      - name: Smoke test Dockerfile with matrix extension build arg
        run: |
          docker run --rm --entrypoint sh crawclaw-ext-smoke:local -lc '
            which crawclaw &&
            crawclaw --version &&
            crawclaw runtimes doctor &&
            node -e "
              const Module = require(\"node:module\");
              const fs = require(\"node:fs\");
              const matrixPackage = require(\"/app/extensions/matrix/package.json\");
              const requireFromMatrix = Module.createRequire(\"/app/extensions/matrix/package.json\");
              const runtimeDeps = Object.keys(matrixPackage.dependencies ?? {});
              if (runtimeDeps.length === 0) {
                throw new Error(
                  \"matrix package has no declared runtime dependencies; smoke cannot validate install mirroring\",
                );
              }
              for (const dep of runtimeDeps) {
                requireFromMatrix.resolve(dep);
              }
              const { spawnSync } = require(\"node:child_process\");
              const run = spawnSync(\"crawclaw\", [\"plugins\", \"list\", \"--json\"], { encoding: \"utf8\" });
              if (run.status !== 0) {
                process.stderr.write(run.stderr || run.stdout || \"plugins list failed\\n\");
                process.exit(run.status ?? 1);
              }
              const parsed = JSON.parse(run.stdout);
              const matrix = (parsed.plugins || []).find((entry) => entry.id === \"matrix\");
              if (!matrix) {
                throw new Error(\"matrix plugin missing from bundled plugin list\");
              }
              const runtimeManifest = JSON.parse(
                fs.readFileSync(process.env.HOME + \"/.crawclaw/runtimes/manifest.json\", \"utf8\"),
              );
              const browser = runtimeManifest.plugins?.browser;
              const scrapling = runtimeManifest.plugins?.[\"scrapling-fetch\"];
              const openWebSearch = runtimeManifest.plugins?.[\"open-websearch\"];
              if (browser?.state !== \"healthy\") {
                throw new Error(\"browser runtime is not healthy after install\");
              }
              if (scrapling?.state !== \"healthy\") {
                throw new Error(\"scrapling-fetch runtime is not healthy after install\");
              }
              if (openWebSearch?.state !== \"healthy\") {
                throw new Error(\"open-websearch runtime is not healthy after install\");
              }
              if (typeof browser?.binPath !== \"string\" || !fs.existsSync(browser.binPath)) {
                throw new Error(\"browser runtime pinchtab binary missing after install\");
              }
              const matrixDiag = (parsed.diagnostics || []).filter(
                (diag) =>
                  typeof diag.source === \"string\" &&
                  diag.source.includes(\"/extensions/matrix\") &&
                  typeof diag.message === \"string\" &&
                  diag.message.includes(\"extension entry escapes package directory\"),
              );
              if (matrixDiag.length > 0) {
                throw new Error(
                  \"unexpected matrix diagnostics: \" +
                    matrixDiag.map((diag) => diag.message).join(\"; \"),
                );
              }
            "
          '

      - name: Build installer smoke image
        uses: docker/build-push-action@v6
        with:
          context: ./scripts/docker
          file: ./scripts/docker/install-sh-smoke/Dockerfile
          tags: crawclaw-install-smoke:local
          load: true
          push: false
          provenance: false

      - name: Select installer smoke source
        id: installer_source
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "install_url=file:///tmp/crawclaw-install.sh"
            echo "cli_install_url=file:///tmp/crawclaw-install.sh"
            echo "local_script=scripts/install.sh"
            echo "skip_nonroot=1"
            echo "nonroot_skip_image_build=0"
            echo "disable_runtime_postinstall=1"
            echo "npm_silent=0"
          } >> "$GITHUB_OUTPUT"

      - name: Build installer non-root image
        if: steps.installer_source.outputs.skip_nonroot != '1'
        uses: docker/build-push-action@v6
        with:
          context: ./scripts/docker
          file: ./scripts/docker/install-sh-nonroot/Dockerfile
          tags: crawclaw-install-nonroot:local
          load: true
          push: false
          provenance: false

      - name: Run installer docker tests
        env:
          CRAWCLAW_INSTALL_URL: ${{ steps.installer_source.outputs.install_url }}
          CRAWCLAW_INSTALL_CLI_URL: ${{ steps.installer_source.outputs.cli_install_url }}
          CRAWCLAW_INSTALL_LOCAL_SCRIPT: ${{ steps.installer_source.outputs.local_script }}
          CRAWCLAW_NO_ONBOARD: "1"
          CRAWCLAW_INSTALL_SMOKE_SKIP_CLI: "1"
          CRAWCLAW_INSTALL_SMOKE_SKIP_IMAGE_BUILD: "1"
          CRAWCLAW_INSTALL_SMOKE_DOCKER_NETWORK: host
          CRAWCLAW_INSTALL_NONROOT_SKIP_IMAGE_BUILD: ${{ steps.installer_source.outputs.nonroot_skip_image_build }}
          CRAWCLAW_INSTALL_SMOKE_SKIP_NONROOT: ${{ steps.installer_source.outputs.skip_nonroot }}
          CRAWCLAW_INSTALL_SMOKE_SKIP_PREVIOUS: "1"
          CRAWCLAW_DISABLE_RUNTIME_POSTINSTALL: ${{ steps.installer_source.outputs.disable_runtime_postinstall }}
          CRAWCLAW_NPM_SILENT: ${{ steps.installer_source.outputs.npm_silent }}
        run: bash scripts/test-install-sh-docker.sh
